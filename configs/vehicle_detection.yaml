# ═══════════════════════════════════════════════════════════════════════════════
#  EdgeSight – Vehicle Detection Configuration  (Task 1)
# ═══════════════════════════════════════════════════════════════════════════════

model:
  name: yolo11n                   # Latest nano variant – Optimized for Edge
  weights: models/yolo11n.pt
  custom_weights: models/best_vehicle_yolo11.pt # Verified 4-class model (Car, Bike, Bus, Truck)
  img_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45

# 🆕 Phase 2: License Plate Detection Model
plate_model:
  weights: models/yolo11n.pt           # Using pre-trained as placeholder (replace with best_plate.pt later)
  img_size: 320                   # Smaller size is fine for plate crops
  confidence_threshold: 0.35
  iou_threshold: 0.45
  device: "cpu"                   # "0" for GPU, "cpu" for CPU

# Custom Dataset class IDs (0: car, 1: motorcycle, 2: bus, 3: truck)
vehicle_classes:   [0, 1, 2, 3]
vehicle_class_names:
  0: "car"
  1: "motorcycle"
  2: "bus"
  3: "truck"

training:
  epochs: 80
  batch_size: 16
  learning_rate: 0.01
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20
  optimizer: "AdamW"
  augmentation:
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    degrees: 5.0
    translate: 0.1
    scale: 0.5
    flipud: 0.0
    fliplr: 0.5
    mosaic: 1.0
    mixup: 0.1

dataset:
  root: "data/vehicle_dataset"
  train: "data/vehicle_dataset/images/train"
  val:   "data/vehicle_dataset/images/val"
  test:  "data/vehicle_dataset/images/test"
  nc: 4
  names: ["car", "motorcycle", "bus", "truck"]

preprocessing:
  target_size: [640, 640]
  normalize: true
  denoise: false
  clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]

output:
  save_dir: "outputs"
  save_detections: true
  save_crops: false
  draw_labels: true
  draw_confidence: true
  bbox_thickness: 2
  font_scale: 0.6

metrics:
  compute_map: true
  map_iou_threshold: 0.5
  save_metrics_json: true
  benchmark_iterations: 100
