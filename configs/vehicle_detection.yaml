# ═══════════════════════════════════════════════════════════════════════════════
#  EdgeSight – Vehicle Detection Configuration  (Task 1)
# ═══════════════════════════════════════════════════════════════════════════════

model:
  name: yolov8n                   # nano variant – ~6 MB / ~3.2 GFLOPs
  weights: models/yolov8n.pt      # COCO pretrained (auto-downloaded if missing)
  custom_weights: models/best_vehicle.pt  # set null until you train your own weights
  img_size: 640
  confidence_threshold: 0.45
  iou_threshold: 0.45
  device: "cpu"                   # "0" for GPU, "cpu" for CPU

# COCO class IDs for vehicles
vehicle_classes:   [2, 3, 5, 7]
vehicle_class_names:
  2: "car"
  3: "motorcycle"
  5: "bus"
  7: "truck"

training:
  epochs: 80
  batch_size: 16
  learning_rate: 0.01
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20
  optimizer: "AdamW"
  augmentation:
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    degrees: 5.0
    translate: 0.1
    scale: 0.5
    flipud: 0.0
    fliplr: 0.5
    mosaic: 1.0
    mixup: 0.1

dataset:
  root: "data/vehicle_dataset"
  train: "data/vehicle_dataset/images/train"
  val:   "data/vehicle_dataset/images/val"
  test:  "data/vehicle_dataset/images/test"
  nc: 4
  names: ["car", "motorcycle", "bus", "truck"]

preprocessing:
  target_size: [640, 640]
  normalize: true
  denoise: false
  clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]

output:
  save_dir: "outputs"
  save_detections: true
  save_crops: false
  draw_labels: true
  draw_confidence: true
  bbox_thickness: 2
  font_scale: 0.6

metrics:
  compute_map: true
  map_iou_threshold: 0.5
  save_metrics_json: true
  benchmark_iterations: 100
